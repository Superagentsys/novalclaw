name: Build

on:
  push:
    branches: [main, master, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────
  # Core library – compile + test on all three platforms
  # ──────────────────────────────────────────────────────────────
  core:
    name: Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest         # Apple Silicon runner
            target: aarch64-apple-darwin
          - os: macos-13             # Intel runner for x86_64
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Check
        run: cargo check -p omninova-core --target ${{ matrix.target }}

      - name: Test
        run: cargo test -p omninova-core --target ${{ matrix.target }}

  # ──────────────────────────────────────────────────────────────
  # Tauri desktop app – native build on each platform
  # ──────────────────────────────────────────────────────────────
  tauri:
    name: Tauri (${{ matrix.platform }})
    needs: core
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 → .dmg + .app
          - platform: macos-arm64
            os: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: "OmniNova-Claw_arm64"
            artifact_ext: ".dmg"

          # macOS x86_64 → .dmg + .app
          - platform: macos-x64
            os: macos-13
            args: "--target x86_64-apple-darwin"
            artifact_name: "OmniNova-Claw_x64"
            artifact_ext: ".dmg"

          # Linux x86_64 → .deb + .rpm + .AppImage
          - platform: linux-x64
            os: ubuntu-22.04
            args: ""
            artifact_name: "OmniNova-Claw_linux_x64"
            artifact_ext: ".AppImage"

          # Windows x86_64 → .msi + .exe (NSIS)
          - platform: windows-x64
            os: windows-latest
            args: ""
            artifact_name: "OmniNova-Claw_windows_x64"
            artifact_ext: ".msi"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{ matrix.platform == 'macos-arm64' && 'aarch64-apple-darwin' || '' }}
            ${{ matrix.platform == 'macos-x64'   && 'x86_64-apple-darwin'  || '' }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-${{ matrix.platform }}

      # ── Linux: system deps ──────────────────────────────────
      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/omninova-tauri/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/omninova-tauri
        run: npm ci

      # ── Tauri Build ─────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional, configure in repo secrets)
          # macOS
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows (optional)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/omninova-tauri
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      # ── Upload artifacts ─────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/omninova-tauri/src-tauri/target/**/release/bundle/**/*${{ matrix.artifact_ext }}
            apps/omninova-tauri/src-tauri/target/release/bundle/**/*${{ matrix.artifact_ext }}
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # macOS Universal Binary (fat binary: arm64 + x86_64)
  # ──────────────────────────────────────────────────────────────
  tauri-macos-universal:
    name: Tauri (macOS Universal)
    needs: core
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: tauri-macos-universal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/omninova-tauri/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/omninova-tauri
        run: npm ci

      - name: Build universal macOS app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/omninova-tauri
          tauriScript: npx tauri
          args: "--target universal-apple-darwin"

      - name: Upload universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: OmniNova-Claw_macos_universal
          path: |
            apps/omninova-tauri/src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # Release – create GitHub Release and attach all artifacts
  # ──────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [tauri, tauri-macos-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
